name: windows-extraction-test
on:
  workflow_dispatch:
jobs:
  test-windows-extraction:
    runs-on: windows-latest
    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - name: Download archive with newline path
        shell: pwsh
        run: |
          $workDir = "$env:RUNNER_TEMP\ziptest"
          New-Item -ItemType Directory -Path $workDir -Force | Out-Null
          $headers = @{ Authorization = "Bearer $env:GITHUB_TOKEN" }
          $url = "https://api.github.com/repos/${{ github.repository }}/zipball/traversal-test"
          Invoke-WebRequest -Uri $url -Headers $headers -OutFile "$workDir\archive.zip"
          Write-Host "Downloaded archive to $workDir\archive.zip"
          Get-Item "$workDir\archive.zip"

      - name: Inspect ZIP entries (hex dump of names)
        shell: pwsh
        run: |
          Add-Type -AssemblyName System.IO.Compression.FileSystem
          $workDir = "$env:RUNNER_TEMP\ziptest"
          $zip = [System.IO.Compression.ZipFile]::OpenRead("$workDir\archive.zip")
          Write-Host "=== ZIP ENTRIES (with hex) ==="
          foreach ($entry in $zip.Entries) {
            $nameBytes = [System.Text.Encoding]::UTF8.GetBytes($entry.FullName)
            $hex = ($nameBytes | ForEach-Object { $_.ToString("x2") }) -join " "
            Write-Host "Entry: [$($entry.FullName)]"
            Write-Host "  Hex:  $hex"
            Write-Host "  Has LF byte (0a): $(($nameBytes -contains 0x0A))"
          }
          $zip.Dispose()

      - name: Test PowerShell Expand-Archive behavior
        shell: pwsh
        run: |
          $workDir = "$env:RUNNER_TEMP\ziptest"
          $dest = "$workDir\extracted_ps"
          New-Item -ItemType Directory -Path $dest -Force | Out-Null
          Write-Host "=== PowerShell Expand-Archive ==="
          Write-Host "Extracting to: $dest"
          try {
            Expand-Archive -Path "$workDir\archive.zip" -DestinationPath $dest -Force
            Write-Host "SUCCESS"
          } catch {
            Write-Host "EXCEPTION: $_"
          }
          Write-Host ""
          Write-Host "=== All files under $workDir ==="
          Get-ChildItem -Recurse $workDir | ForEach-Object {
            $relative = $_.FullName.Substring($workDir.Length)
            Write-Host "  $relative"
          }
          Write-Host ""
          Write-Host "=== Files in RUNNER_TEMP (outside ziptest) ==="
          Get-ChildItem $env:RUNNER_TEMP | ForEach-Object {
            Write-Host "  $($_.Name)"
          }

      - name: Test .NET ZipFile.ExtractToDirectory
        shell: pwsh
        run: |
          Add-Type -AssemblyName System.IO.Compression.FileSystem
          $workDir = "$env:RUNNER_TEMP\ziptest"
          $dest = "$workDir\extracted_dotnet"
          New-Item -ItemType Directory -Path $dest -Force | Out-Null
          Write-Host "=== .NET ZipFile.ExtractToDirectory ==="
          try {
            [System.IO.Compression.ZipFile]::ExtractToDirectory("$workDir\archive.zip", $dest)
            Write-Host "SUCCESS"
          } catch {
            Write-Host "EXCEPTION: $_"
          }
          Write-Host ""
          Write-Host "=== Files extracted ==="
          Get-ChildItem -Recurse $dest | ForEach-Object {
            Write-Host "  $($_.FullName.Substring($dest.Length))"
          }

      - name: Check if traversal.txt escaped (look in parent dirs)
        shell: pwsh
        run: |
          $workDir = "$env:RUNNER_TEMP\ziptest"
          $parentDir = $env:RUNNER_TEMP
          Write-Host "=== Checking for traversal.txt outside ziptest ==="
          Write-Host "ziptest contents:"
          Get-ChildItem -Recurse $workDir -Filter "traversal.txt" | ForEach-Object {
            Write-Host "  INSIDE: $($_.FullName)"
          }
          Write-Host "Parent ($parentDir) contents:"
          Get-ChildItem $parentDir -Filter "traversal.txt" | ForEach-Object {
            Write-Host "  *** ESCAPED to parent: $($_.FullName) ***"
          }
          Write-Host "All .txt files in parent dir:"
          Get-ChildItem $parentDir | ForEach-Object {
            Write-Host "  $($_.Name) [$($_.GetType().Name)]"
          }

      - name: Test naive extractor (strip newlines, resolve path)
        shell: pwsh
        run: |
          Add-Type -AssemblyName System.IO.Compression.FileSystem
          $workDir = "$env:RUNNER_TEMP\ziptest"
          $dest = "$workDir\extracted_naive"
          New-Item -ItemType Directory -Path $dest -Force | Out-Null

          Write-Host "=== Naive extractor simulation (strips LF from name) ==="
          $zip = [System.IO.Compression.ZipFile]::OpenRead("$workDir\archive.zip")
          foreach ($entry in $zip.Entries) {
            if ($entry.FullName.EndsWith("/")) { continue }
            $rawName = $entry.FullName
            $stripped = $rawName -replace "`n", ""
            $targetPath = [System.IO.Path]::GetFullPath([System.IO.Path]::Combine($dest, $stripped))
            Write-Host "  Raw:      [$rawName]"
            Write-Host "  Stripped: [$stripped]"
            Write-Host "  Resolved: [$targetPath]"
            $isInside = $targetPath.StartsWith($dest + "\") -or $targetPath.Equals($dest)
            if ($isInside) {
              Write-Host "  SAFE: inside extraction root"
            } else {
              Write-Host "  *** PATH TRAVERSAL CONFIRMED: outside $dest! ***"
              Write-Host "  Would write to: $targetPath"
            }
          }
          $zip.Dispose()
