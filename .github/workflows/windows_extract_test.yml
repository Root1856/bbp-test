name: windows-extraction-test
on:
  workflow_dispatch:
jobs:
  test-windows-extraction:
    runs-on: windows-latest
    steps:
      - name: Download archive with newline path
        shell: pwsh
        run: |
          $headers = @{ Authorization = "Bearer ${{ secrets.GITHUB_TOKEN }}" }
          $url = "https://api.github.com/repos/${{ github.repository }}/zipball/traversal-test"
          Invoke-WebRequest -Uri $url -Headers $headers -OutFile "C:\test\archive.zip"
          Write-Host "Downloaded archive"
          Get-Item "C:\test\archive.zip"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Inspect archive content (hex)
        shell: pwsh
        run: |
          Add-Type -AssemblyName System.IO.Compression.FileSystem
          $zip = [System.IO.Compression.ZipFile]::OpenRead("C:\test\archive.zip")
          Write-Host "=== ZIP ENTRIES ==="
          foreach ($entry in $zip.Entries) {
            $nameBytes = [System.Text.Encoding]::UTF8.GetBytes($entry.FullName)
            $hex = ($nameBytes | ForEach-Object { $_.ToString("x2") }) -join ""
            Write-Host ("Entry: [" + $entry.FullName + "]")
            Write-Host "  Hex: $hex"
            Write-Host "  Length: $($nameBytes.Length)"
          }
          $zip.Dispose()

      - name: Test PowerShell Expand-Archive
        shell: pwsh
        run: |
          $dest = "C:\test\extracted_ps"
          New-Item -ItemType Directory -Path $dest -Force
          Write-Host "=== Testing PowerShell Expand-Archive ==="
          try {
            Expand-Archive -Path "C:\test\archive.zip" -DestinationPath $dest -Force
            Write-Host "Extraction succeeded"
          } catch {
            Write-Host "EXCEPTION: $_"
          }
          Write-Host "=== Files after PowerShell extraction ==="
          Get-ChildItem -Recurse $dest | ForEach-Object {
            Write-Host "  [$($_.FullName)]"
          }
          Write-Host "=== Root of C:\test ==="
          Get-ChildItem "C:\test" -Recurse | ForEach-Object {
            Write-Host "  [$($_.FullName)]"
          }

      - name: Test .NET ZipFile.ExtractToDirectory
        shell: pwsh
        run: |
          Add-Type -AssemblyName System.IO.Compression.FileSystem
          $dest = "C:\test\extracted_dotnet"
          New-Item -ItemType Directory -Path $dest -Force
          Write-Host "=== Testing .NET ZipFile.ExtractToDirectory ==="
          try {
            [System.IO.Compression.ZipFile]::ExtractToDirectory("C:\test\archive.zip", $dest)
            Write-Host "Extraction succeeded"
          } catch {
            Write-Host "EXCEPTION: $_"
          }
          Write-Host "=== Files after .NET extraction ==="
          Get-ChildItem -Recurse $dest | ForEach-Object {
            Write-Host "  [$($_.FullName)]"
          }

      - name: Test manual entry-by-entry extraction (.NET)
        shell: pwsh
        run: |
          Add-Type -AssemblyName System.IO.Compression.FileSystem
          $dest = "C:\test\extracted_manual"
          New-Item -ItemType Directory -Path $dest -Force
          Write-Host "=== Testing manual .NET extraction (simulate vulnerable extractor) ==="
          $zip = [System.IO.Compression.ZipFile]::OpenRead("C:\test\archive.zip")
          foreach ($entry in $zip.Entries) {
            $rawName = $entry.FullName
            # Simulate: strip newline from filename (what a naive extractor might do)
            $stripped = $rawName -replace "`n", ""
            $targetPath = Join-Path $dest $stripped
            Write-Host "  Raw name: [$rawName]"
            Write-Host "  Stripped: [$stripped]"
            Write-Host "  Target:   [$targetPath]"
            Write-Host "  Resolved: [$(Resolve-Path -Path $targetPath -ErrorAction SilentlyContinue)]"
            # Check if target is outside $dest (traversal)
            if ($targetPath.StartsWith($dest)) {
              Write-Host "  SAFE: within extraction root"
            } else {
              Write-Host "  *** PATH TRAVERSAL: outside extraction root! ***"
            }
          }
          $zip.Dispose()

      - name: Test Win32 path normalization with trailing dots
        shell: pwsh
        run: |
          Write-Host "=== Win32 trailing-dot normalization test ==="
          $testDir = "C:\test\dottest"
          # Try creating a directory named "safe.."
          $pathWithDots = Join-Path $testDir "safe.."
          New-Item -ItemType Directory -Path $testDir -Force
          try {
            New-Item -ItemType Directory -Path $pathWithDots -Force
            Write-Host "Created directory: [$pathWithDots]"
            $actual = Get-Item $pathWithDots
            Write-Host "Actual resolved path: [$($actual.FullName)]"
          } catch {
            Write-Host "FAILED to create 'safe..': $_"
          }
          # Try creating a directory named "safe" then go up with ..
          $safeDir = Join-Path $testDir "safe"
          New-Item -ItemType Directory -Path $safeDir -Force
          $traversalPath = Join-Path $safeDir "..\outside.txt"
          Write-Host "Traversal path: [$traversalPath]"
          $resolved = [System.IO.Path]::GetFullPath($traversalPath)
          Write-Host "Resolved full path: [$resolved]"
          Write-Host "Outside test dir? $(-not $resolved.StartsWith($testDir))"

      - name: Check if traversal.txt landed outside expected directory
        shell: pwsh
        run: |
          Write-Host "=== Final check for traversal evidence ==="
          Write-Host "Contents of C:\test:"
          Get-ChildItem "C:\test" -Recurse | Sort-Object FullName | ForEach-Object {
            Write-Host "  $($_.FullName)"
          }
          # Check if traversal.txt exists at root level (would be C:\test\traversal.txt)
          if (Test-Path "C:\traversal.txt") {
            Write-Host "*** TRAVERSAL CONFIRMED: C:\traversal.txt exists! ***"
          } elseif (Test-Path "C:\test\traversal.txt") {
            Write-Host "*** TRAVERSAL CONFIRMED: C:\test\traversal.txt exists outside archive folder! ***"
          } else {
            Write-Host "No traversal.txt found outside archive subfolder."
          }
