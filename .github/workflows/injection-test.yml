name: Injection Test
on:
  push:
    branches: ['**']

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Echo branch name (VULNERABLE pattern)
        run: |
          echo "Branch: ${{ github.ref_name }}"
          echo "Actor: ${{ github.actor }}"
          echo "Done"
      - name: Env-based (SAFE pattern for comparison)
        env:
          BRANCH: ${{ github.ref_name }}
        run: |
          echo "Branch via env: $BRANCH"
