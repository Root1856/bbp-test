name: oidc-env-claim
on:
  workflow_dispatch:
    inputs:
      env_name:
        description: "Environment name to claim in OIDC"
        required: true
        default: "production"
permissions:
  id-token: write
  contents: read
jobs:
  get-oidc:
    runs-on: ubuntu-latest
    environment: ${{ inputs.env_name }}
    steps:
      - name: Get OIDC token for claimed environment
        run: |
          # Request OIDC with environment claim
          TOKEN=$(curl -sH "Authorization: bearer $ACTIONS_ID_TOKEN_REQUEST_TOKEN" \
            "$ACTIONS_ID_TOKEN_REQUEST_URL&audience=api.github.com" \
            | jq -r ".value")
          # Decode and display claims
          echo "$TOKEN" | cut -d. -f2 | base64 -d 2>/dev/null | python3 -m json.tool | \
            grep -E "sub|environment|iss|aud|repo|ref" || true
          echo "TOKEN_PREFIX=${TOKEN:0:20}"
          # Try using the OIDC token as GitHub API auth
          curl -s -H "Authorization: Bearer $TOKEN" \
            "https://api.github.com/repos/Root1856/bbp-test" | jq ".message // .name"
